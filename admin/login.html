<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Administration</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body login-page">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:20px;">
      <img src="../assets/images/logo.png" alt="Logo" style="width:70px;height:70px;object-fit:contain;margin:0 auto 10px;display:block;">
      <h2>Administration</h2>
      <p style="color:var(--text-light);font-size:0.9rem;">Chronique de James Mukeshaba</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="username" class="form-input" placeholder="Nom d'utilisateur" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" class="form-input" placeholder="Mot de passe" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;">Se connecter</button>
    </form>

  </div>
  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
